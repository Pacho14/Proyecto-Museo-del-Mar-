<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Máscara Tortuga</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        #qrcode canvas {
            max-width: 100%;
            height: auto;
        }

        .info {
            background: #f3e5f5;
            border-left: 4px solid #9c27b0;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: left;
            font-size: 14px;
            color: #6a1b9a;
        }

        .info strong {
            display: block;
            margin-bottom: 8px;
            color: #4a148c;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #9c27b0;
            color: white;
        }

        .btn-primary:hover {
            background: #7b1fa2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(156, 39, 176, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #efefef;
            border-color: #999;
        }

        .emoji {
            font-size: 48px;
            margin: 20px 0;
        }

        .qr-text {
            font-family: 'Courier New', monospace;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            color: #666;
            font-size: 12px;
            word-break: break-all;
            margin-top: 15px;
        }

        @media print {
            body {
                background: white;
            }
            .container {
                box-shadow: none;
                border: 1px solid #ddd;
            }
            .buttons {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐢 Máscara de Tortuga</h1>
        <p class="subtitle">Código QR para Escaneo en Cámara</p>
        
        <div class="emoji">🐢</div>

        <div id="qrcode"></div>

        <div class="qr-text" id="qrText">qr-code mascara tortuga</div>

        <div class="info">
            <strong>📱 Cómo usar:</strong>
            <p>
                1. Imprime o muestra este QR en pantalla<br>
                2. Abre la cámara del escáner<br>
                3. Apunta el QR a la cámara<br>
                4. Se cambiará automáticamente a la máscara de la tortuga 🐢
            </p>
        </div>

        <div class="buttons">
            <button class="btn-primary" onclick="window.print()">🖨️ Imprimir</button>
            <button class="btn-secondary" onclick="descargarQR()">⬇️ Descargar</button>
        </div>
    </div>

    <script>
        // Generar QR code
        const qrText = "qr-code mascara tortuga";
        
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: qrText,
            width: 300,
            height: 300,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Función para descargar QR
        function descargarQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'qr-code-mascara-tortuga.png';
                link.click();
            }
        }

        // Log para debug
        console.log('✅ QR Code generado:', qrText);
    </script>
</body>
</html>
