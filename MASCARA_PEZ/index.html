<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Escáner Pez">
    <title>Escaner de Máscaras - Pez</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Escáner de Máscaras 🐟</h1>
            <p>Captura de peces en tiempo real</p>
        </header>

        <div class="camera-section">
            <!-- Video en vivo desde la cámara -->
            <video id="video" autoplay playsinline muted></video>
            
            <!-- Canvas oculto para captura -->
            <canvas id="canvas" style="display: none;"></canvas>

            <!-- Canvas para detección -->
            <canvas id="detectionCanvas" style="display: none;"></canvas>
            
            <!-- Overlay SVG de la máscara pez -->
            <svg id="maskOverlay" class="mask-overlay" viewBox="0 0 278.61 223.01">
                <path class="mask-path" d="M104.23,200.9c1.03,3.78,1.66,7.61.73,11.5-1.45,6.09-6.56,8.97-12.96,7.07-8.68-2.58-14.41-8.61-18.34-16.53-1.29-2.59-2.43-5.26-2.96-8.1-.32-1.71-1.11-2.31-2.74-2.65-17.46-3.67-33.54-10.46-47.5-21.74-9.38-7.58-16.73-16.65-19.63-28.74-1.79-7.46-.6-14.51,2.67-21.3.62-1.29.86-2.31.09-3.73-4.96-9.18-2.07-23.93,8.27-28.99.9-.44,1.32-1.15,1.67-2.01,10.49-25.4,30.52-39.41,56.02-46.83,1.63-.47,2.59-1.25,3.44-2.65C84.39,17.45,100.28,4.84,122.24,1.01c11.32-1.98,22.49-1.26,33.04,3.98,6.62,3.29,10.06,8.51,10.09,15.96.04,9.43,4.06,16.62,12.08,21.65,3.66,2.3,7.39,4.53,10.79,7.24,10.99,8.77,13.68,21.77,6.92,34.39-.99,1.85-.84,2.8.63,4.27,3.73,3.7,7.47,7.34,12.02,10.05.77.46,1.55.92,2.37,1.3,6.3,2.93,8.98,2.32,13.38-3.05,3.39-4.13,5.97-8.82,8.98-13.2,7.79-11.35,17.61-20.01,31.08-23.96,2.87-.84,5.79-1.51,8.79-1.32,4.72.29,7.66,4.2,5.47,8.26-4.98,9.27-6.41,19.46-8.76,29.44-2.35,9.98-7.06,18.5-15.58,24.53.06.27.05.47.14.55,9.61,7.92,13.38,18.56,13.98,30.55.27,5.35,1.67,10.29,4.06,15.02.37.72.72,1.45,1.04,2.2,1.99,4.72.04,8.04-5.08,8.55-3.95.4-7.72-.56-11.41-1.81-9.82-3.31-17.58-9.44-23.79-17.61-3-3.95-5.79-8.06-8.73-12.06-2.99-4.05-4.18-4.36-8.96-2.76-4.99,1.67-9.03,4.83-12.97,8.16-.7.6-1,.96-.28,1.91,6.1,8.05,5.7,16.72,1.58,25.28-4.06,8.43-11.58,11.74-20.59,12.07-7.73.29-15.04-1.53-21.97-4.88-1.51-.73-2.73-.74-4.27.05-5.38,2.76-11.11,4.65-17.3,6.42,3.87,3.83,6.43,8.13,7.54,13.26.58,2.7.64,5.41.2,8.08-1.11,6.7-6.84,10.4-14.12,9.33-10.95-1.62-18.78-7.81-24.65-16.85-1.08-1.66-1.98-3.43-2.97-5.15-.25-.4-.5-.81-.74-1.21-.55.43-.16.86,0,1.29Z"/>
            </svg>

            <!-- Encuadre/Frame visual -->
            <div class="frame-overlay">
            </div>

            <!-- Overlay para oscurecer áreas fuera del frame -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-secondary" title="Iniciar cámara">
                <span class="btn-icon">▶️</span>
                <span class="btn-text">Iniciar Cámara</span>
            </button>
            <button id="stopBtn" class="btn btn-secondary" title="Detener cámara" style="display: none;">
                <span class="btn-icon">⏹️</span>
                <span class="btn-text">Detener Cámara</span>
            </button>
            <button id="captureManualBtn" class="btn btn-info" title="Capturar manualmente" style="display: none;">
                <span class="btn-icon">📸</span>
                <span class="btn-text">Capturar Ahora</span>
            </button>
            <button id="fullscreenBtn" class="btn btn-secondary" title="Pantalla completa">
                <span class="btn-icon">🖥️</span>
                <span class="btn-text">Pantalla Completa</span>
            </button>
        </div>

        <div class="server-controls">
            <h3>🐟 Acuario del Museo</h3>
            <div class="server-input-group">
                <input type="text" id="serverUrl" placeholder="IP:Puerto (ej: 192.168.1.100:3000)" class="server-input">
                <button id="connectBtn" class="btn btn-accent" title="Conectar al acuario">
                    <span class="btn-icon">🔗</span>
                    <span class="btn-text">Conectar</span>
                </button>
            </div>
            <div class="server-status">
                <p id="connectionStatus">⚫ Desconectado</p>
            </div>
            <button id="sendAllBtn" class="btn btn-info" style="display: none;">
                <span class="btn-icon">📤</span>
                <span class="btn-text">Enviar todas al Acuario</span>
            </button>
        </div>

        <div class="gallery-section">
            <h2>Imágenes Capturadas</h2>
            <div id="gallery" class="gallery">
                <p class="gallery-empty">No hay imágenes capturadas aún</p>
            </div>
            <button id="downloadAllBtn" class="btn btn-secondary" style="display: none;">
                <span class="btn-icon">💾</span>
                <span class="btn-text">Descargar todas</span>
            </button>
            <button id="clearAllBtn" class="btn btn-danger" style="display: none;">
                <span class="btn-icon">🗑️</span>
                <span class="btn-text">Limpiar todo</span>
            </button>
        </div>

        <!-- Notificación de captura -->
        <div id="notification" class="notification">
            <span id="notificationText">Imagen capturada</span>
        </div>

        <!-- Modal de captura exitosa -->
        <div id="captureModal" class="capture-modal" style="display: none;">
            <div class="capture-modal-content">
                <div class="modal-header">
                    <h2>✅ ¡Pez Capturado!</h2>
                    <p class="modal-timer">Se cerrará en <span id="modalTimer">6</span>s</p>
                </div>
                
                <div class="modal-preview">
                    <img id="capturePreview" src="" alt="Pez capturado">
                </div>
                
                <div class="modal-actions">
                    <button id="modalSendBtn" class="btn btn-primary modal-btn">
                        <span class="btn-icon">📤</span>
                        <span class="btn-text">ENVIAR AL ARRECIFE</span>
                    </button>
                    <button id="modalDiscardBtn" class="btn btn-secondary modal-btn">
                        <span class="btn-icon">✕</span>
                        <span class="btn-text">DESCARTAR</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Panel de DEBUG -->
        <div id="debugPanel" style="background: #1a1a1a; color: #00ff00; padding: 10px; margin-top: 20px; border-radius: 5px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; border: 2px solid #00ff00;">
            <div style="font-weight: bold; margin-bottom: 5px; color: #ffff00;">DEBUG LOGS:</div>
            <div id="debugOutput"></div>
        </div>
        <button onclick="document.getElementById('debugPanel').style.display = document.getElementById('debugPanel').style.display === 'none' ? 'block' : 'none'; return false;" style="margin-top: 10px; padding: 8px; background: #333; color: #0f0; border: 1px solid #0f0; border-radius: 3px; cursor: pointer;">🔍 Mostrar/Ocultar Logs</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
